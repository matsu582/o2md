plugins {
    id 'java'
    id 'org.graalvm.buildtools.native' version '0.10.4'
}

group = 'com.github.matsu582'
version = '0.1.0'

java {
    sourceCompatibility = JavaVersion.VERSION_21
    targetCompatibility = JavaVersion.VERSION_21
}

repositories {
    mavenCentral()
}

dependencies {
    implementation 'net.sf.mpxj:mpxj:13.5.1'
}

jar {
    manifest {
        attributes 'Main-Class': 'com.github.matsu582.mppreader.MppReader'
    }
}

graalvmNative {
    binaries {
        main {
            mainClass = 'com.github.matsu582.mppreader.MppReader'
            imageName = 'mpp-reader'

            buildArgs.addAll(
                '--no-fallback',
                '-H:+ReportExceptionStackTraces',
                '--initialize-at-build-time=org.apache.commons',
                '--initialize-at-build-time=org.apache.poi',
                '--initialize-at-build-time=org.apache.logging.log4j',
                '-H:+AddAllCharsets',
            )
        }
    }
}

// 依存JARを全てlibディレクトリにコピーするタスク
tasks.register('copyDeps', Copy) {
    from configurations.runtimeClasspath
    into layout.buildDirectory.dir('libs')
}
